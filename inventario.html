<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario | FarmaPOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root{--bg:#ecfdf5;--panel:#fff;--line:#d1fae5;--ink:#0f172a;--muted:#64748b;--brand:#065f46;--danger:#dc2626;--warn:#d97706}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Poppins",sans-serif}
body{background:var(--bg);color:var(--ink);min-height:100vh;margin:0;padding:0;overflow-x:hidden}
.layout{display:block;padding-left:270px;min-height:100vh}
.sidebar{background:linear-gradient(180deg,#064e3b 0%,#022c22 100%);color:#ecfdf5;padding:24px 18px;position:fixed;top:0;left:0;bottom:0;width:270px;overflow-y:auto;z-index:1200}
.brand{font-weight:700;font-size:1.2rem;margin-bottom:24px;display:flex;gap:10px;align-items:center}.brand-logo{width:36px;height:36px;border-radius:10px;object-fit:contain;background:rgba(255,255,255,0.16)}.brand-name{font-weight:700;font-size:1.2rem}
.menu a{display:flex;align-items:center;gap:10px;color:#d1fae5;text-decoration:none;padding:10px 12px;border-radius:11px;margin-bottom:6px;transition:background .2s,color .2s,transform .2s;font-size:.94rem}
.menu a.active,.menu a:hover{background:rgba(255,255,255,.13);color:#fff}
.main{padding:20px 18px 28px;width:100%;margin:0;max-width:none}
.top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;background:var(--panel);border:1px solid var(--line);padding:14px;border-radius:12px;margin-bottom:12px}
.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 10px 28px rgba(2,44,34,.08)}
.big{font-size:1.3rem;font-weight:700}
.table{width:100%;border-collapse:collapse;margin-top:14px;table-layout:fixed}
.table th,.table td{padding:10px 8px;border-bottom:1px solid #ecfeff;text-align:left;font-size:.9rem;word-break:break-word}
.badge{font-size:.75rem;border-radius:99px;padding:4px 8px}
.badge.ok{background:#dcfce7;color:#166534}.badge.warn{background:#ffedd5;color:var(--warn)}.badge.danger{background:#fee2e2;color:var(--danger)}
.logout{border:1px solid #bbf7d0;background:#f0fdf4;color:var(--brand);padding:7px 10px;border-radius:8px;cursor:pointer}
.form-grid{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:10px;margin-top:12px}
.form-grid input{padding:9px;border:1px solid #cbd5e1;border-radius:8px}
.btn-save{background:#065f46;color:#fff;border:none;border-radius:8px;padding:9px;cursor:pointer}
.btn-secondary{background:#e2e8f0;color:#0f172a;border:none;border-radius:8px;padding:9px;cursor:pointer}
.btn-small{font-size:.78rem;padding:6px 8px;border-radius:8px;border:none;cursor:pointer}
.btn-edit{background:#dcfce7;color:#166534}
.btn-delete{background:#fee2e2;color:#991b1b}
.msg{margin-top:8px;font-size:.85rem;color:var(--muted)}
.toast{position:fixed;right:16px;bottom:16px;background:#0f172a;color:#fff;padding:10px 14px;border-radius:10px;font-size:.85rem;opacity:0;pointer-events:none;transform:translateY(12px);transition:.25s}
.toast.show{opacity:1;transform:translateY(0)}
.menu-toggle{display:none;border:1px solid #cdeee2;background:#fff;color:#065f46;border-radius:8px;padding:6px 9px;cursor:pointer}
.sidebar-overlay{display:none}

/* modal y escaneo */
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(15,23,42,.55);z-index:2000;padding:16px}
.modal.active{display:flex}
.modal-card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px;max-width:420px;width:100%;box-shadow:0 22px 50px rgba(15,23,42,.35)}
.modal-title{font-weight:700;font-size:1rem;margin-bottom:6px;color:#065f46}
.modal-actions{display:flex;gap:8px;margin-top:12px}
.modal-actions button{flex:1;padding:10px;border-radius:10px;font-weight:700;border:1px solid #d1d5db;cursor:pointer}
.camera-preview{width:100%;border-radius:10px;overflow:hidden;background:#000;margin-top:8px}
.camera-preview video{width:100%;display:block}
.camera-status{font-size:.88rem;color:#475569;margin-top:6px}

@media(max-width:860px){  .layout{padding-left:0}
  .sidebar{display:block;position:fixed;left:0;top:0;bottom:0;width:270px;z-index:50;transform:translateX(-110%);transition:transform .2s ease;box-shadow:0 18px 60px rgba(2,44,34,.22)}
  .menu-toggle{display:inline-flex;align-items:center;justify-content:center}
  .sidebar-overlay{
    display:block;
    position:fixed;
    inset:0;
    background:rgba(2,44,34,.35);
    -webkit-backdrop-filter:blur(2px);
    backdrop-filter:blur(2px);
    z-index:40;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease;
  }
  .layout.sidebar-open .sidebar{transform:translateX(0)}
  .layout.sidebar-open .sidebar-overlay{opacity:1;pointer-events:auto}
  .grid{grid-template-columns:1fr}
}
/* ---------- MEJORAS VISUALES ---------- */

/* scroll elegante */
::-webkit-scrollbar{
width:8px;
}
::-webkit-scrollbar-track{
background:#ecfdf5;
}
::-webkit-scrollbar-thumb{
background:#10b981;
border-radius:10px;
}

/* animaciones generales */
.card,
.menu a,
.btn-save,
.btn-secondary,
.btn-small,
.logout{
transition:all .25s ease;
}

/* tarjetas m�s modernas */
.card{
box-shadow:0 6px 20px rgba(2,44,34,.06);
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(2,44,34,.12);
}

/* sidebar menu */
.menu a{
font-weight:500;
}

.menu a:hover{
transform:translateX(4px);
}

/* botones */
.btn-save{
background:linear-gradient(135deg,#065f46,#047857);
font-weight:600;
}

.btn-save:hover{
transform:translateY(-1px);
box-shadow:0 6px 16px rgba(6,95,70,.35);
}

.btn-secondary{
background:#f1f5f9;
font-weight:500;
}

.btn-secondary:hover{
background:#e2e8f0;
transform:translateY(-1px);
}

.logout:hover{
background:#dcfce7;
}

/* botones peque�os */
.btn-small:hover{
transform:scale(1.05);
}

/* inputs */
.form-grid input{
transition:border .2s,box-shadow .2s;
}

.form-grid input:focus{
outline:none;
border:1px solid #10b981;
box-shadow:0 0 0 3px rgba(16,185,129,.15);
}

/* tabla */
.table thead{
background:#f0fdf4;
}

.table tbody tr:hover{
background:#f8fafc;
}

/* badges */
.badge{
font-weight:600;
letter-spacing:.2px;
}

/* top bar */
.top{
box-shadow:0 4px 16px rgba(2,44,34,.05);
}

/* toast m�s elegante */
.toast{
font-weight:500;
box-shadow:0 12px 30px rgba(0,0,0,.3);
}

/* modal mejora */
.modal-card{
animation:modalPop .25s ease;
}

@keyframes modalPop{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>
</head>
<body>
<div class="layout">
<aside class="sidebar">
  <div class="brand"> 
  <img src="image/Logo.png" alt="Logo" class="brand-logo" onerror="this.style.display='none'"><div class="brand-name">FarmaPOS</div></div>
  <nav class="menu">
    <a href="dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="ventas.html"><i class="bi bi-cart-plus"></i> Ventas</a>
    <a href="inventario.html" class="active"><i class="bi bi-box-seam"></i> Inventario</a>
    <a href="reportes.html"><i class="bi bi-file-earmark-bar-graph"></i> Reportes</a>
  </nav>
</aside>
<div class="sidebar-overlay" onclick="toggleSidebar(false)"></div>
<main class="main">
  <section class="top">
    <button class="menu-toggle" type="button" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
    <div>
      <div style="font-weight:600">Modulo de inventario</div>
      <div id="sync" style="font-size:.8rem;color:var(--muted)">Sincronizando...</div>
    </div>
    <div class="top-actions">
      <button class="btn-secondary" type="button" onclick="exportInventoryExcel()"><i class="bi bi-file-earmark-spreadsheet"></i> Excel</button>
      <button class="btn-secondary" type="button" onclick="exportInventoryPdf()"><i class="bi bi-filetype-pdf"></i> PDF</button>
      <button class="logout" type="button" onclick="logout()">Cerrar sesion</button>
    </div>
  </section>
  <section class="grid">
    <article class="card"><div style="color:var(--muted);font-size:.85rem">Productos totales</div><div class="big" id="totalProducts">0</div></article>
    <article class="card"><div style="color:var(--muted);font-size:.85rem">Stock critico</div><div class="big" id="criticalStock">0</div></article>
    <article class="card"><div style="color:var(--muted);font-size:.85rem">Vence en 30 dias</div><div class="big" id="expiringCount">0</div></article>
  </section>
  <section class="card" style="margin-bottom:12px">
    <div style="font-weight:600">Agregar producto</div>
    <div class="form-grid">
      <input id="fCodigo" placeholder="C?digo de barras (opcional)">
      <button class="btn-secondary" type="button" onclick="openScanModalInv()">Escanear con c?mara</button>
      <input id="fProducto" placeholder="Producto">
      <input id="fLote" placeholder="Lote">
      <input id="fStock" type="number" min="0" placeholder="Stock">
      <input id="fMin" type="number" min="0" placeholder="Stock minimo">
      <input id="fPrecio" type="number" min="0" step="0.01" placeholder="Precio venta">
      <input id="fVence" type="date" placeholder="Vencimiento">
      <button class="btn-save" id="saveBtn" onclick="saveProduct()">Guardar</button>
      <button class="btn-secondary" id="cancelBtn" onclick="cancelEdit()" style="display:none">Cancelar</button>
    </div>
    <div class="msg" id="formMsg"></div>
  </section>
  <section class="card">
    <div style="font-weight:600">Detalle de productos</div>
    <table class="table">
      <thead><tr><th>Producto</th><th>Lote</th><th>Stock</th><th>Min</th><th>Precio</th><th>Vencimiento</th><th>Estado</th><th>Acciones</th></tr></thead>
      <tbody id="invRows"></tbody>
    </table>
  </section>
</main>
</div>
<div class="toast" id="toast"></div>
<div class="modal" id="scanModalInv">
  <div class="modal-card">
    <div class="modal-title">Escanear c?digo</div>
    <div class="camera-preview"><video id="scanVideoInv" playsinline></video></div>
    <div class="camera-status" id="scanStatusInv">Apunta la c?mara al c?digo de barras.</div>
    <div class="modal-actions">
      <button class="btn-secondary" type="button" onclick="stopScanCameraInv()">Cerrar</button>
      <button class="btn-save" type="button" onclick="startScanCameraInv()">Reintentar</button>
    </div>
  </div>
</div>
<script src="inventario.js?v=20260316"></script>

</body>
</html>
